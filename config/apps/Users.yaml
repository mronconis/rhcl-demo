apiVersion: v1
kind: Service
metadata:
  name: users-v1
  namespace: service-mesh-demo
  labels:
    app: users
spec:
  ports:
  - port: 8080
    name: http
  selector:
    app: users
    version: "1.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: users-v2
  namespace: service-mesh-demo
  labels:
    app: users
spec:
  ports:
  - port: 8080
    name: http
  selector:
    app: users
    version: "2.0.0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-mesh-demo-users
  namespace: service-mesh-demo
  labels:
    account: users
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-v1
  namespace: service-mesh-demo
  labels:
    app: users
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
      version: "1.0.0"
  template:
    metadata:
      labels:
        app: users
        version: "1.0.0"
    spec:
      serviceAccountName: service-mesh-demo-users
      containers:
      - name: users-v1
        image: image-registry.openshift-image-registry.svc:5000/service-mesh-demo/users:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-v2
  namespace: service-mesh-demo
  labels:
    app: users
    version: "2.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
      version: "2.0.0"
  template:
    metadata:
      labels:
        app: users
        version: "2.0.0"
    spec:
      serviceAccountName: service-mesh-demo-users
      containers:
      - name: users-v2
        image: image-registry.openshift-image-registry.svc:5000/service-mesh-demo/users:2.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: users-route-v1
  namespace: service-mesh-demo
spec:
  parentRefs:
  - name: users-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1
    backendRefs:
    - name: users-v1
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: users-route-v2
  namespace: service-mesh-demo
spec:
  parentRefs:
  - name: users-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v2
    backendRefs:
    - name: users-v2
      port: 8080